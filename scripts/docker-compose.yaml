version: '3'
services:
  db:
    image: mysql:8.4
    container_name: db
    restart: always
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: wuh
      MYSQL_PASSWORD: admin888
      MYSQL_HOST_AUTH_METHOD: mysql_native_password
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    environment:
      REDIS_PASSWORD: admin888
      REDIS_DB: 0